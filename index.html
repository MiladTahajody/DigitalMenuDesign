  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #5bc1b5, #63CCBF);
      color: #2C2C2C;
      display: flex;
      flex-direction: column;
    }

    h1,
    h3 {
      text-align: center;
      margin-bottom: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }


    /* Cafe cards */
    .cafe-list {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      justify-content: center;
      align-items: flex-start;
      flex: 1;
    }

    .cafe-card {
      background: linear-gradient(180deg, #000000, #2C2C2C);
      padding: 16px;
      border-radius: 16px;
      width: 200px;
      text-align: center;
      box-shadow:
        0 8px 24px #00000099,
        inset 0 1px 0 #2C2C2C0a;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .cafe-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 14px 36px rgba(0, 0, 0, 0.75),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* Cafe logo */
    .cafe-logo {
      width: 42px;
      height: 42px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cafe-logo img,
    .cafe-logo svg {
      width: 100%;
      height: 100%;
      filter: brightness(0.95);
    }

    .cafe-card span {
      display: block;
      font-weight: 600;
      color: #ffffff;
    }

    .cafe-card a {
      display: inline-block;
      margin-top: 10px;
      font-weight: 500;
      text-decoration: none;
      color: #d7b58a;
      transition: color 0.2s ease;
    }

    .cafe-card a:hover {
      color: #f0cfa0;
    }

    /* Footer */
    footer {
      margin-top: 44px;
      padding: 30px 22px;
      background: linear-gradient(180deg, #000000, #2C2C2C);
      border-radius: 20px;
      box-shadow:
        0 10px 30px #000000b3,
        inset 0 1px 0 #2C2C2C0a;
      text-align: center;
    }

    footer p {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.6;
      color: #ffffff;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 26px;
    }

    .social-links a svg {
      width: 32px;
      height: 32px;
      fill: #d7b58a;
      transition: transform 0.2s ease, fill 0.2s ease;
    }

    .social-links a:hover svg {
      fill: #f0cfa0;
      transform: translateY(-2px);
    }
  </style>
