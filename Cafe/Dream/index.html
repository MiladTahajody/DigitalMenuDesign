    <style>
        @font-face {
        font-family: "en";
        src: url("/Cafe/Dream/en.woff") format("woff");
        font-display: block;
        }

        @font-face {
        font-family: "fr";
        src: url("/Cafe/Dream/fr.woff2") format("woff2");
        font-display: block;
        }

        :root {
            --loader-color: #904D70;
        }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            text-align: center;
            background: #fff;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .logo {
            width: 220px;
            height: 220px;
            object-fit: contain;
        }

        .text {
        font-size: 32px;
        font-weight: 600;
        font-family: "en", sans-serif;
        color: var(--loader-color);
        }

        .loader {
        display: flex;
        gap: 6px;
        align-items: center;
        }

        .loader span {
        width: 12px;
        height: 12px;
        background: var(--loader-color);
        border-radius: 50%;
        transform: translateY(0);
        animation: bounce 0.6s infinite ease-in-out;
        will-change: transform, opacity;
        }

        .loader span:nth-child(2) {
        animation-delay: 0.1s;
        }

        .loader span:nth-child(3) {
        animation-delay: 0.2s;
        }

        @keyframes bounce {
        0%, 100% {
        transform: translateY(0) scale(0.7);
        opacity: 0.4;
        }
        50% {
        transform: translateY(-6px) scale(1);
        opacity: 1;
        }
        }

        #error-screen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            background: #fff;
            z-index: 9998;
            padding: 32px;
            box-sizing: border-box;
        }

        .error-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .error-title {
            font-family: "fr", sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--loader-color);
            margin: 0;
        }

        .error-subtitle {
            font-family: "fr", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--loader-color);
            margin: 0;
            line-height: 2;
        }

        .error-btn {
            font-family: "fr", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: var(--loader-color);
            border: none;
            border-radius: 18px 4px;
            padding: 12px 36px;
            margin-top: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .error-btn:hover {
            opacity: 0.85;
        }

        @media (max-width: 480px) {
            .logo       { width: 200px; height: 200px; }
            .text       { font-size: 28px; }
            .error-logo { width: 110px; height: 110px; }
            .error-title    { font-size: 19px; }
            .error-subtitle { font-size: 13px; }
            .error-btn  { font-size: 14px; padding: 11px 30px; }
        }
    </style>
