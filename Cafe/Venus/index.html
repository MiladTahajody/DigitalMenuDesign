        :root {
            --loader-color: #C49E6E;
        }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #141416;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            text-align: center;
            background: #141416;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .logo {
            width: 220px;
            height: 220px;
            object-fit: contain;
        }

        .text {
        font-size: 20px;
        font-weight: 500;
        font-family: "en", sans-serif;
        color: var(--loader-color);
        }

        .loader {
        display: flex;
        gap: 6px;
        align-items: center;
        }

        .loader span {
        width: 12px;
        height: 12px;
        background: var(--loader-color);
        border-radius: 50%;
        transform: translateY(0);
        animation: bounce 0.6s infinite ease-in-out;
        will-change: transform, opacity;
        }

        .loader span:nth-child(2) {
        animation-delay: 0.1s;
        }

        .loader span:nth-child(3) {
        animation-delay: 0.2s;
        }

        @keyframes bounce {
        0%, 100% {
        transform: translateY(0) scale(0.7);
        opacity: 0.4;
        }
        50% {
        transform: translateY(-6px) scale(1);
        opacity: 1;
        }
        }

        #error-screen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            background: #141416;
            z-index: 9998;
            padding: 32px;
            box-sizing: border-box;
        }

        .error-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .error-title {
            font-family: "fr", sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--loader-color);
            margin: 0;
        }

        .error-subtitle {
            font-family: "fr", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--loader-color);
            margin: 0;
            line-height: 2;
        }

        .error-btn {
            font-family: "fr", sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #141416;
            background: var(--loader-color);
            border: none;
            border-radius: 18px 4px;
            padding: 12px 36px;
            margin-top: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .error-btn:hover {
            opacity: 0.85;
        }

        @media (max-width: 480px) {
            .logo       { width: 200px; height: 200px; }
            .text       { font-size: 28px; }
            .error-logo { width: 110px; height: 110px; }
            .error-title    { font-size: 19px; }
            .error-subtitle { font-size: 13px; }
            .error-btn  { font-size: 14px; padding: 11px 30px; }
        }
    </style>

    <div id="error-screen">
        <img src="/logo.svg" class="error-logo" alt="Venus Café">
        <p class="error-title">اتصال به منو برقرار نشد</p>
        <p class="error-subtitle">لطفاً وضعیت اینترنت خود را بررسی<br>و دوباره تلاش کنید</p>

	<script>
	    (function() {
            var loader      = document.getElementById("loader");
            var errorScreen = document.getElementById("error-screen");
            var connection  = navigator.connection || {};
            var type        = connection.effectiveType || "4g";
            var figmaBuffer =
                type === "slow-2g" ? 9000 :
                type === "2g"      ? 8000 :
                type === "3g"      ? 7000 : 6000;
            var fallbackDelay = 20000;
            var finished      = false;
            var loadReceived  = false;
            var frame;

            function success() {
                if (finished) return;
                finished = true;
                loader.style.opacity      = "0";
                loader.style.pointerEvents = "none";

                if (frame) {
                    frame.style.transition = "opacity 0.8s ease 0.3s";
                    frame.style.opacity    = "1";
                }
            }

            function fail() {
                if (finished) return;
                finished = true;
                loader.style.opacity      = "0";
                loader.style.pointerEvents = "none";
                errorScreen.style.display = "flex";
            }

            setTimeout(function() {

                frame        = document.createElement("iframe");
                frame.src    = "https://www.figma.com/proto/mTpVbcmN9NRXHBrcCYmYKu/Venus-CAFE?node-id=2-37&viewport=1384%2C-84%2C0.43&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=2%3A37&page-id=0%3A1&hotspot-hints=0&hide-ui=1&embed-host=share";
                frame.style.cssText = "position:fixed;inset:0;width:100%;height:100%;border:0;opacity:0;z-index:1;";
                document.body.appendChild(frame);

                frame.addEventListener("load", function() {
                    loadReceived = true;
                    setTimeout(success, figmaBuffer);
                });

                setTimeout(function() {
                    if (!loadReceived) fail();
                }, fallbackDelay);

            }, 300);

        })();
	</script>
